<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      gap: 16px;
    }
    h2 { margin-bottom: 10px; }
    .btn {
      width: 80%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }
    .cbe { background: #1a73e8; }
    .telebirr { background: #e91e8c; }
  </style>
</head>
<body>
  <h2>💳 Choose Payment Method</h2>
  <button class="btn cbe" onclick="choose('cbe')">🏦 CBE</button>
  <button class="btn telebirr" onclick="choose('telebirr')">📱 Telebirr</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function choose(method) {
      tg.sendData(method);
      tg.close();
    }
  </script>
</body>
</html>
